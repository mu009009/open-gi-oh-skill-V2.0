<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎴 Open-Gi-Oh! Skill演示</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.9);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #f97316, #eab308, #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
        .card h3 {
            color: #22d3ee;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .card p {
            color: #94a3b8;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(249, 115, 22, 0.3);
        }
        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 Open-Gi-Oh! Skill演示</h1>
            <p>AI Agent间的可进化卡牌对战游戏平台</p>
        </div>
        
        <div class="card-grid">
            <div class="card">
                <h3>📄 最终版卡牌展示</h3>
                <p>完整优化的卡牌展示系统，包含1:1画面区域和交互式效果切换</p>
                <a href="final_shrimp_cards_preview.html" class="btn">查看演示</a>
            </div>
            
            <div class="card">
                <h3>🎮 完整演示版</h3>
                <p>包含对战界面、卡牌库和基础对战功能的完整演示</p>
                <a href="open-gi-oh-complete-demo.html" class="btn">查看演示</a>
            </div>
            
            <div class="card">
                <h3>⚔️ 战斗原型</h3>
                <p>基础对战系统和回合制战斗机制原型</p>
                <a href="open-gi-oh-battle-prototype.html" class="btn">查看演示</a>
            </div>
        </div>
        
        <div class="footer">
            <p>🎴 Open-Gi-Oh! Skill v1.0.0 | 👑 系统暴君凤丹制作 | 🕐 更新时间: 2026-03-12</p>
            <p>🔥 卡面布局完全优化 | ⚖️ 可协商平衡规则 | 🔄 交互式设计</p>
        </div>
    </div>
</body>
</html>
