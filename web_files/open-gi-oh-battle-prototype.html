<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎴 Open-Gi-Oh! - AI Agent卡牌对战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffcc00, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 1.1rem;
        }
        
        .game-area {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .battle-field {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .player-area {
            margin-bottom: 30px;
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .player-name {
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .player-stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #aaa;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ecdc4;
        }
        
        .card-field {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            min-height: 150px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }
        
        .hand-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .hand-cards {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px;
            min-height: 180px;
        }
        
        .card {
            width: 120px;
            height: 168px;
            background: linear-gradient(135deg, #2d3047 0%, #41476e 100%);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
        }
        
        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }
        
        .card.can-attack {
            border: 3px solid #ff6b6b !important;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.7) !important;
            animation: attackGlow 1.5s infinite !important;
        }
        
        @keyframes attackGlow {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(255, 107, 107, 0.7);
                border-color: #ff6b6b;
            }
            50% { 
                box-shadow: 0 0 40px rgba(255, 107, 107, 0.9);
                border-color: #ffcc00;
            }
        }
        
        .card-cost {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ff9a3c, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
        }
        
        .card-name {
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .card-stats {
            position: absolute;
            bottom: 15px;
            width: calc(100% - 30px);
            display: flex;
            justify-content: space-between;
        }
        
        .card-attack, .card-health {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .card-attack {
            background: linear-gradient(135deg, #ff6b6b, #ff9a3c);
            color: white;
        }
        
        .card-health {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }
        
        .card-element {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
        }
        
        .controls {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group h3 {
            margin-bottom: 10px;
            color: #4ecdc4;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #41476e, #2d3047);
        }
        
        .log-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 400px;
            overflow-y: auto;
        }
        
        .log-title {
            margin-bottom: 15px;
            color: #4ecdc4;
            font-size: 1.2rem;
        }
        
        .log-messages {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .turn-indicator {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 107, 0.2), transparent);
            border-radius: 10px;
            animation: turnPulse 2s infinite;
        }
        
        @keyframes turnPulse {
            0%, 100% { background: linear-gradient(90deg, transparent, rgba(255, 107, 107, 0.2), transparent); }
            50% { background: linear-gradient(90deg, transparent, rgba(255, 107, 107, 0.4), transparent); }
        }
        
        .ai-area .player-name {
            color: #ff6b6b;
        }
        
        .player-area .player-name {
            color: #4ecdc4;
        }
        
        .card[data-element="fire"] {
            background: linear-gradient(135deg, #ff6b6b, #ff9a3c);
        }
        
        .card[data-element="water"] {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }
        
        .card[data-element="light"] {
            background: linear-gradient(135deg, #ffcc00, #ff9a3c);
        }
        
        .card[data-element="dark"] {
            background: linear-gradient(135deg, #6b52ae, #3a2c5f);
        }
        
        .card[data-element="wind"] {
            background: linear-gradient(135deg, #52c234, #2a7a1c);
        }
        
        .card[data-element="earth"] {
            background: linear-gradient(135deg, #8b4513, #a0522d);
        }
        
        /* 稀有度边框 */
        .card[data-rarity="N"] { border-color: #cccccc; }
        .card[data-rarity="R"] { border-color: #4ecdc4; border-width: 2px; }
        .card[data-rarity="SR"] { border-color: #ff6b6b; border-width: 3px; }
        .card[data-rarity="SSR"] { 
            border-color: #ffcc00; 
            border-width: 3px;
            animation: ssrGlow 2s infinite;
        }
        
        @keyframes ssrGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 204, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 204, 0, 0.8); }
        }
        
        .card-rarity {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #ffcc00;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 Open-Gi-Oh!</h1>
            <div class="subtitle">AI Agent间的可进化卡牌对战游戏 - 凤丹工作室出品</div>
        </div>
        
        <div class="game-area">
            <div class="battle-field">
                <div class="turn-indicator" id="turnIndicator">
                    🎮 第 <span id="turnNumber">1</span> 回合 - <span id="currentPlayer">玩家</span>的回合
                </div>
                
                <!-- AI区域 -->
                <div class="player-area ai-area">
                    <div class="player-header">
                        <div class="player-name">🤖 AI Agent</div>
                        <div class="player-stats">
                            <div class="stat">
                                <div class="stat-label">生命值</div>
                                <div class="stat-value" id="aiHealth">30</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">费用</div>
                                <div class="stat-value" id="aiMana">2</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">手牌</div>
                                <div class="stat-value" id="aiHandCount">3</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-field" id="aiField">
                        <!-- AI场上的卡牌将在这里显示 -->
                    </div>
                </div>
                
                <!-- 玩家区域 -->
                <div class="player-area player-area">
                    <div class="player-header">
                        <div class="player-name">👤 玩家 (凤丹)</div>
                        <div class="player-stats">
                            <div class="stat">
                                <div class="stat-label">生命值</div>
                                <div class="stat-value" id="playerHealth">30</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">费用</div>
                                <div class="stat-value" id="playerMana">1</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">手牌</div>
                                <div class="stat-value" id="playerHandCount">3</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-field" id="playerField">
                        <!-- 玩家场上的卡牌将在这里显示 -->
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <h3>🎮 游戏控制</h3>
                    <button class="btn" onclick="endTurn()">结束回合</button>
                    <button class="btn" onclick="drawCard()">抽一张牌</button>
                    <button class="btn btn-secondary" onclick="resetGame()">重新开始</button>
                </div>
                
                <div class="control-group">
                    <h3>🃏 卡牌操作</h3>
                    <button class="btn" onclick="playRandomCard()">使用随机卡牌</button>
                    <button class="btn btn-secondary" onclick="aiPlayCard()">AI出牌</button>
                </div>
                
                <div class="control-group">
                    <h3>⚙️ 系统设置</h3>
                    <button class="btn btn-secondary" onclick="toggleDebug()">调试模式</button>
                    <button class="btn btn-secondary" onclick="generateTestCards()">生成测试卡牌</button>
                </div>
                
                <div class="control-group">
                    <h3>📊 游戏信息</h3>
                    <div id="gameInfo">
                        <p>回合: <span id="infoTurn">1</span></p>
                        <p>当前玩家: <span id="infoPlayer">玩家</span></p>
                        <p>玩家手牌: <span id="infoHandSize">3</span>/7</p>
                        <p>牌库剩余: <span id="infoDeck">17</span></p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="hand-area">
            <div class="player-header">
                <div class="player-name">🃏 你的手牌</div>
                <div class="player-stats">
                    <div class="stat">
                        <div class="stat-label">可出牌</div>
                        <div class="stat-value" id="playableCards">0</div>
                    </div>
                </div>
            </div>
            <div class="hand-cards" id="playerHand">
                <!-- 玩家手牌将在这里显示 -->
            </div>
        </div>
        
        <div class="log-area">
            <div class="log-title">📜 战斗日志</div>
            <div class="log-messages" id="gameLog">
                <div class="log-entry">🎴 Open-Gi-Oh! 游戏启动...</div>
                <div class="log-entry">🃏 初始手牌已发放</div>
                <div class="log-entry">🎮 游戏开始！第1回合 - 玩家的回合</div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 游戏核心数据 ====================
        let game = {
            turn: 1,
            currentPlayer: 'player',
            player: {
                health: 30,
                mana: 1,
                manaMax: 1,
                hand: [],
                field: [],
                deck: [],
                handSizeLimit: 7
            },
            ai: {
                health: 30,
                mana: 2,
                manaMax: 2,
                hand: [],
                field: [],
                deck: [],
                handSizeLimit: 7
            }
        };
        
        // 卡牌元素类型
        const elements = ['fire', 'water', 'wind', 'earth', 'light', 'dark'];
        const elementIcons = {
            fire: '🔥',
            water: '💧',
            wind: '💨',
            earth: '🪨',
            light: '✨',
            dark: '🌑'
        };
        
        // 稀有度
        const rarities = ['N', 'R', 'SR', 'SSR'];
        const rarityNames = {
            'N': '普通',
            'R': '稀有',
            'SR': '超级稀有',
            'SSR': '传说'
        };
        
        // ==================== 游戏初始化 ====================
        function initGame() {
            // 初始化卡牌
            initializeDecks();
            
            // 洗牌
            shuffle(game.player.deck);
            shuffle(game.ai.deck);
            
            // 初始手牌
            for (let i = 0; i < 3; i++) {
                drawCard('player');
                drawCard('ai');
            }
            
            // 更新UI
            updateUI();
            addLog('🎴 Open-Gi-Oh! 游戏启动成功！');
            addLog('🃏 基于炉石传说经典数值模型');
            addLog('🎮 系统暴君凤丹制作');
        }
        
        function initializeDecks() {
            // 清空牌库
            game.player.deck = [];
            game.ai.deck = [];
            
            // 创建基础卡牌（参考炉石经典模型）
            const basicCards = [
                // 1费卡牌
                { id: 1, name: '火元素学徒', cost: 1, attack: 2, health: 1, element: 'fire', rarity: 'N' },
                { id: 2, name: '水元素学徒', cost: 1, attack: 1, health: 2, element: 'water', rarity: 'N' },
                { id: 3, name: '风之信使', cost: 1, attack: 1, attack: 1, health: 1, element: 'wind', rarity: 'R' },
                
                // 2费卡牌
                { id: 4, name: '岩石守卫', cost: 2, attack: 2, health: 3, element: 'earth', rarity: 'N' },
                { id: 5, name: '光明侍从', cost: 2, attack: 3, health: 2, element: 'light', rarity: 'N' },
                { id: 6, name: '暗影猎手', cost: 2, attack: 2, health: 2, element: 'dark', rarity: 'R' },
                
                // 3费卡牌
                { id: 7, name: '火焰法师', cost: 3, attack: 3, health: 4, element: 'fire', rarity: 'R' },
                { id: 8, name: '水之祭司', cost: 3, attack: 2, health: 5, element: 'water', rarity: 'R' },
                { id: 9, name: '风暴使者', cost: 3, attack: 4, health: 3, element: 'wind', rarity: 'SR' },
                
                // 4费卡牌
                { id: 10, name: '大地守护者', cost: 4, attack: 4, health: 5, element: 'earth', rarity: 'R' },
                { id: 11, name: '圣光骑士', cost: 4, attack: 5, health: 4, element: 'light', rarity: 'SR' },
                { id: 12, name: '暗夜领主', cost: 4, attack: 4, health: 4, element: 'dark', rarity: 'SR' },
                
                // 5费卡牌
                { id: 13, name: '烈焰巨龙', cost: 5, attack: 5, health: 6, element: 'fire', rarity: 'SR' },
                { id: 14, name: '深海巨兽', cost: 5, attack: 6, health: 5, element: 'water', rarity: 'SR' },
                { id: 15, name: '风神后裔', cost: 5, attack: 4, health: 7, element: 'wind', rarity: 'SSR' },
                
                // 6费卡牌
                { id: 16, name: '山脉巨人', cost: 6, attack: 6, health: 7, element: 'earth', rarity: 'SSR' },
                { id: 17, name: '光明天使', cost: 6, attack: 7, health: 6, element: 'light', rarity: 'SSR' },
                { id: 18, name: '暗影魔王', cost: 6, attack: 6, health: 6, element: 'dark', rarity: 'SSR' }
            ];
            
            // 每个卡牌加入2张到牌库
            basicCards.forEach(card => {
                game.player.deck.push({...card});
                game.player.deck.push({...card});
                game.ai.deck.push({...card});
                game.ai.deck.push({...card});
            });
        }
        
        // ==================== 游戏核心函数 ====================
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function drawCard(playerType) {
            const player = game[playerType];
            
            if (player.deck.length === 0) {
                addLog(`🃏 ${playerType === 'player' ? '玩家' : 'AI'}牌库已空！`);
                return null;
            }
            
            if (player.hand.length >= player.handSizeLimit) {
                addLog(`🃏 ${playerType === 'player' ? '玩家' : 'AI'}手牌已满！`);
                return null;
            }
            
            const card = {...player.deck.pop()};
            card.canAttack = false; // 抽到的卡牌在手上时不能攻击
            player.hand.push(card);
            
            addLog(`🃏 ${playerType === 'player' ? '玩家' : 'AI'}抽到: ${card.name}`);
            updateUI();
            return card;
        }
        
        function playCard(cardIndex, playerType) {
            const player = game[playerType];
            const card = player.hand[cardIndex];
            
            if (!card) return false;
            
            if (card.cost > player.mana) {
                addLog(`❌ 费用不足！需要 ${card.cost} 点，当前 ${player.mana} 点`);
                return false;
            }
            
            // 消耗费用
            player.mana -= card.cost;
            
            // 从手牌移除，加入战场
            player.hand.splice(cardIndex, 1);
            player.field.push({
                ...card,
                canAttack: false, // 召唤的回合不能攻击（除非有冲锋效果）
                id: Date.now() + Math.random() // 唯一ID
            });
            
            addLog(`🎴 ${playerType === 'player' ? '玩家' : 'AI'}使用了 ${card.name}`);
            updateUI();
            return true;
        }
        
        function attack(attackerIndex, targetIndex, playerType, targetType) {
            const attacker = game[playerType].field[attackerIndex];
            const target = game[targetType].field[targetIndex];
            
            if (!attacker || !attacker.canAttack) {
                addLog('❌ 这张卡牌不能攻击！');
                return false;
            }
            
            if (!target) {
                addLog('❌ 目标不存在！');
                return false;
            }
            
            // 攻击逻辑
            addLog(`⚔️ ${attacker.name} 攻击 ${target.name}`);
            
            // 计算伤害
            target.health -= attacker.attack;
            attacker.health -= target.attack;
            
            // 检查死亡
            if (target.health <= 0) {
                game[targetType].field.splice(targetIndex, 1);
                addLog(`💀 ${target.name} 被消灭！`);
            }
            
            if (attacker.health <= 0) {
                game[playerType].field.splice(attackerIndex, 1);
                addLog(`💀 ${attacker.name} 被消灭！`);
            } else {
                // 攻击后不能再攻击（除非有连击效果）
                attacker.canAttack = false;
            }
            
            updateUI();
            return true;
        }
        
        function endTurn() {
            // 切换玩家
            game.currentPlayer = game.currentPlayer === 'player' ? 'ai' : 'player';
            game.turn++;
            
            // 新回合开始
            if (game.currentPlayer === 'player') {
                // 玩家回合开始
                game.player.manaMax = Math.min(game.turn, 10);
                game.player.mana = game.player.manaMax;
                
                // 场上的卡牌可以攻击
                game.player.field.forEach(card => {
                    card.canAttack = true;
                });
                
                addLog(`🎮 第 ${game.turn} 回合 - 玩家的回合开始`);
                addLog(`💎 玩家获得 ${game.player.mana} 点费用`);
            } else {
                // AI回合开始
                game.ai.manaMax = Math.min(game.turn, 10);
                game.ai.mana = game.ai.manaMax;
                
                // 场上的卡牌可以攻击
                game.ai.field.forEach(card => {
                    card.canAttack = true;
                });
                
                addLog(`🎮 第 ${game.turn} 回合 - AI的回合开始`);
                addLog(`💎 AI获得 ${game.ai.mana} 点费用`);
                
                // AI自动行动
                setTimeout(aiTurn, 1000);
            }
            
            // 抽牌
            drawCard(game.currentPlayer);
            
            updateUI();
        }
        
        function aiTurn() {
            // 简单的AI逻辑
            const ai = game.ai;
            
            // 先攻击
            ai.field.forEach((card, index) => {
                if (card.canAttack && game.player.field.length > 0) {
                    const targetIndex = Math.floor(Math.random() * game.player.field.length);
                    attack(index, targetIndex, 'ai', 'player');
                } else if (card.canAttack && game.player.health > 0) {
                    // 直接攻击玩家
                    game.player.health -= card.attack;
                    card.canAttack = false;
                    addLog(`⚔️ AI的 ${card.name} 直接攻击玩家，造成 ${card.attack} 点伤害`);
                }
            });
            
            // 再出牌
            for (let i = ai.hand.length - 1; i >= 0; i--) {
                if (ai.hand[i].cost <= ai.mana) {
                    playCard(i, 'ai');
                    break;
                }
            }
            
            // 结束AI回合
            setTimeout(() => endTurn(), 2000);
        }
        
        // ==================== UI更新函数 ====================
        function updateUI() {
            // 更新基本信息
            document.getElementById('turnNumber').textContent = game.turn;
            document.getElementById('currentPlayer').textContent = game.currentPlayer === 'player' ? '玩家' : 'AI';
            
            // 更新玩家状态
            document.getElementById('playerHealth').textContent = game.player.health;
            document.getElementById('playerMana').textContent = game.player.mana;
            document.getElementById('playerHandCount').textContent = game.player.hand.length;
            
            document.getElementById('aiHealth').textContent = game.ai.health;
            document.getElementById('aiMana').textContent = game.ai.mana;
            document.getElementById('aiHandCount').textContent = game.ai.hand.length;
            
            // 更新游戏信息
            document.getElementById('infoTurn').textContent = game.turn;
            document.getElementById('infoPlayer').textContent = game.currentPlayer === 'player' ? '玩家' : 'AI';
            document.getElementById('infoHandSize').textContent = game.player.hand.length;
            document.getElementById('infoDeck').textContent = game.player.deck.length;
            
            // 更新可出牌数量
            const playable = game.player.hand.filter(card => card.cost <= game.player.mana).length;
            document.getElementById('playableCards').textContent = playable;
            
            // 渲染手牌
            renderHand();
            
            // 渲染战场
            renderField('playerField', game.player.field, 'player');
            renderField('aiField', game.ai.field, 'ai');
            
            // 检查游戏结束
            checkGameOver();
        }
        
        function renderHand() {
            const handElement = document.getElementById('playerHand');
            handElement.innerHTML = '';
            
            game.player.hand.forEach((card, index) => {
                const cardElement = createCardElement(card, index, 'hand');
                handElement.appendChild(cardElement);
                
                // 添加点击事件
                cardElement.addEventListener('click', () => {
                    if (card.cost <= game.player.mana && game.currentPlayer === 'player') {
                        playCard(index, 'player');
                    } else if (card.cost > game.player.mana) {
                        addLog(`❌ 费用不足！需要 ${card.cost} 点费用`);
                    }
                });
            });
        }
        
        function renderField(fieldId, fieldCards, playerType) {
            const fieldElement = document.getElementById(fieldId);
            fieldElement.innerHTML = '';
            
            fieldCards.forEach((card, index) => {
                const cardElement = createCardElement(card, index, 'field');
                fieldElement.appendChild(cardElement);
                
                // 如果是场上卡牌且可以攻击，添加攻击事件
                if (playerType === 'player' && card.canAttack) {
                    cardElement.classList.add('can-attack');
                    cardElement.addEventListener('click', () => {
                        if (game.currentPlayer === 'player') {
                            // 选择攻击目标
                            selectAttackTarget(card, index, playerType);
                        }
                    });
                }
            });
        }
        
        function createCardElement(card, index, location) {
            const cardElement = document.createElement('div');
            cardElement.className = 'card';
            cardElement.dataset.id = card.id;
            cardElement.dataset.index = index;
            cardElement.dataset.element = card.element;
            cardElement.dataset.rarity = card.rarity;
            
            const elementIcon = elementIcons[card.element] || '🎴';
            const rarityName = rarityNames[card.rarity] || card.rarity;
            
            cardElement.innerHTML = `
                <div class="card-cost">${card.cost}</div>
                <div class="card-element">${elementIcon}</div>
                <div class="card-name">${card.name}</div>
                <div class="card-stats">
                    <div class="card-attack">${card.attack}</div>
                    <div class="card-health">${card.health}</div>
                </div>
                <div class="card-rarity">${rarityName}</div>
            `;
            
            return cardElement;
        }
        
        function selectAttackTarget(attacker, attackerIndex, playerType) {
            const targetType = playerType === 'player' ? 'ai' : 'player';
            const targets = game[targetType].field;
            
            if (targets.length === 0) {
                // 直接攻击玩家
                game[targetType].health -= attacker.attack;
                attacker.canAttack = false;
                addLog(`⚔️ ${attacker.name} 直接攻击${targetType === 'player' ? '玩家' : 'AI'}，造成 ${attacker.attack} 点伤害`);
                updateUI();
                return;
            }
            
            // 简单选择第一个目标
            attack(attackerIndex, 0, playerType, targetType);
        }
        
        // ==================== 工具函数 ====================
        function addLog(message) {
            const logElement = document.getElementById('gameLog');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            
            logElement.appendChild(logEntry);
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function resetGame() {
            game = {
                turn: 1,
                currentPlayer: 'player',
                player: {
                    health: 30,
                    mana: 1,
                    manaMax: 1,
                    hand: [],
                    field: [],
                    deck: [],
                    handSizeLimit: 7
                },
                ai: {
                    health: 30,
                    mana: 2,
                    manaMax: 2,
                    hand: [],
                    field: [],
                    deck: [],
                    handSizeLimit: 7
                }
            };
            
            const logElement = document.getElementById('gameLog');
            logElement.innerHTML = `
                <div class="log-entry">🎴 游戏已重置</div>
                <div class="log-entry">🔄 重新初始化游戏...</div>
            `;
            
            initGame();
        }
        
        function checkGameOver() {
            if (game.player.health <= 0) {
                addLog('💀 游戏结束！玩家被击败！');
                setTimeout(() => alert('游戏结束！AI获胜！'), 100);
                return true;
            }
            
            if (game.ai.health <= 0) {
                addLog('🎉 游戏结束！AI被击败！');
                setTimeout(() => alert('游戏结束！玩家获胜！'), 100);
                return true;
            }
            
            return false;
        }
        
        // ==================== 控制函数 ====================
        function drawCard() {
            if (game.currentPlayer === 'player') {
                drawCard('player');
            } else {
                addLog('❌ 不是你的回合！');
            }
        }
        
        function playRandomCard() {
            if (game.currentPlayer !== 'player') {
                addLog('❌ 不是你的回合！');
                return;
            }
            
            const playableCards = game.player.hand.filter(card => card.cost <= game.player.mana);
            if (playableCards.length === 0) {
                addLog('❌ 没有可出的卡牌！');
                return;
            }
            
            const randomIndex = Math.floor(Math.random() * playableCards.length);
            const card = playableCards[randomIndex];
            const handIndex = game.player.hand.findIndex(c => c.id === card.id);
            
            if (handIndex !== -1) {
                playCard(handIndex, 'player');
            }
        }
        
        function aiPlayCard() {
            if (game.currentPlayer === 'ai') {
                const ai = game.ai;
                for (let i = ai.hand.length - 1; i >= 0; i--) {
                    if (ai.hand[i].cost <= ai.mana) {
                        playCard(i, 'ai');
                        break;
                    }
                }
            } else {
                addLog('❌ 不是AI的回合！');
            }
        }
        
        function generateTestCards() {
            // 生成一些测试卡牌
            const testCards = [
                { id: 100, name: '测试卡牌1', cost: 1, attack: 1, health: 1, element: 'fire', rarity: 'N' },
                { id: 101, name: '测试卡牌2', cost: 2, attack: 3, health: 2, element: 'water', rarity: 'R' },
                { id: 102, name: '测试卡牌3', cost: 3, attack: 3, health: 4, element: 'wind', rarity: 'SR' },
                { id: 103, name: '测试卡牌4', cost: 4, attack: 5, health: 4, element: 'light', rarity: 'SSR' }
            ];
            
            testCards.forEach(card => {
                game.player.hand.push({...card});
            });
            
            addLog('🃏 生成4张测试卡牌到手牌');
            updateUI();
        }
        
        function toggleDebug() {
            const debugInfo = document.getElementById('gameInfo');
            if (debugInfo.style.display === 'none') {
                debugInfo.style.display = 'block';
                addLog('🔧 调试信息已显示');
            } else {
                debugInfo.style.display = 'none';
                addLog('🔧 调试信息已隐藏');
            }
        }
        
        // ==================== 启动游戏 ====================
        window.onload = initGame;
    </script>
</body>
</html>
